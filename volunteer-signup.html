<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volunteer Sign-Up</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root {
  --linen:   #FAF7F2;
  --ink:     #1a2e1c;
  --ink-mid: #2e4430;
  --ink-dim: #5a7a5c;
  --sage:    #8FA888;
  --wheat:   #C9A96E;
  --rule:    rgba(26,46,28,0.18);
}

html { font-size: 18px; }

body {
  background: var(--linen);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  font-weight: 400;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.page { max-width: 680px; margin: 0 auto; padding: 3.5rem 2rem 6rem; }

/* ── Header ── */
.site-header {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.6rem;
  margin-bottom: 3rem;
}

.site-name {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: 0.78rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-dim);
}

.page-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: clamp(2.4rem, 7vw, 3.6rem);
  letter-spacing: -0.01em;
  line-height: 1.05;
  text-align: center;
  color: var(--ink);
  margin-bottom: 0.4rem;
}

.page-date {
  font-size: 0.72rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-dim);
  text-align: center;
  margin-bottom: 3rem;
}

/* ── Slots ── */
.slots { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; }

@media (max-width: 520px) {
  .slots { grid-template-columns: 1fr; gap: 2.5rem; }
}

.slot {}

.slot-header { margin-bottom: 1.5rem; }

.slot-time-label {
  font-size: 0.74rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--wheat);
  margin-bottom: 0.35rem;
}

.slot-name {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: 1.9rem;
  color: var(--ink);
  line-height: 1.15;
}

.slot-time {
  font-size: 0.92rem;
  color: var(--ink-dim);
  margin-top: 2px;
  letter-spacing: 0.04em;
}

.slot-count {
  font-size: 0.8rem;
  letter-spacing: 0.1em;
  color: var(--sage);
  margin-top: 6px;
}

hr.slot-rule {
  border: none;
  border-top: 0.5px solid var(--rule);
  margin-bottom: 1.1rem;
}

/* ── Sign-up input ── */
.signup-row {
  display: flex;
  gap: 0;
  border-bottom: 0.5px solid var(--rule);
  margin-bottom: 1.25rem;
  transition: border-color 0.2s;
}

.signup-row:focus-within { border-bottom-color: var(--sage); }

.name-input {
  flex: 1;
  background: transparent;
  border: none;
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 1rem;
  color: var(--ink);
  padding: 6px 0 8px;
  outline: none;
  min-width: 0;
}

.name-input::placeholder { color: var(--ink-dim); font-style: italic; }

.add-btn {
  background: none;
  border: none;
  font-family: 'Inter', sans-serif;
  font-size: 0.78rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--sage);
  cursor: pointer;
  padding: 6px 0 8px 12px;
  white-space: nowrap;
  transition: color 0.15s;
}
.add-btn:hover { color: var(--ink); }

/* ── Names list ── */
.names-list { list-style: none; }

.name-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 0.65rem 0;
  border-bottom: 0.5px solid var(--rule);
}

.name-row:first-child { border-top: 0.5px solid var(--rule); }

.name-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.9rem;
  color: var(--ink-dim);
  min-width: 1.4em;
}

.name-text {
  flex: 1;
  font-size: 1rem;
  color: var(--ink-mid);
}

.remove-btn {
  background: none;
  border: none;
  font-size: 0.65rem;
  color: var(--ink-dim);
  cursor: pointer;
  opacity: 0;
  padding: 2px 4px;
  transition: opacity 0.15s, color 0.15s;
  letter-spacing: 0.1em;
}

.name-row:hover .remove-btn { opacity: 1; }
.remove-btn:hover { color: #b05050; }

.empty-slot {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1.05rem;
  color: var(--ink-dim);
  padding: 0.6rem 0;
}

/* ── Admin clear ── */
.admin-bar {
  display: flex;
  justify-content: center;
  gap: 2rem;
  margin-top: 4rem;
  padding-top: 2rem;
  border-top: 0.5px solid var(--rule);
  flex-wrap: wrap;
}

.admin-link {
  background: none;
  border: none;
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 0.78rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-dim);
  cursor: pointer;
  transition: color 0.15s;
}
.admin-link:hover { color: var(--ink); }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--ink);
  color: var(--linen);
  font-family: 'Inter', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  padding: 9px 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  white-space: nowrap;
  z-index: 99;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Date picker ── */
.date-picker-row {
  display: flex;
  align-items: baseline;
  gap: 0.75rem;
  justify-content: center;
  margin-bottom: 2.5rem;
}
.date-label {
  font-size: 0.82rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-dim);
}
.day-input {
  background: transparent;
  border: none;
  border-bottom: 0.5px solid var(--rule);
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: 1.2rem;
  color: var(--ink);
  padding: 2px 4px 6px;
  outline: none;
  cursor: pointer;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.day-input:focus { border-bottom-color: var(--sage); }
</style>
</head>
<body>
<div class="page">

  <header class="site-header">
    <!-- Frog mark -->
    <svg width="60" height="52" viewBox="0 0 60 52" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <ellipse cx="30" cy="34" rx="16" ry="13" stroke="#8FA888" stroke-width="1.1" fill="none"/>
      <ellipse cx="30" cy="24" rx="11" ry="8" stroke="#8FA888" stroke-width="1.1" fill="none"/>
      <circle cx="22" cy="18" r="4.5" stroke="#8FA888" stroke-width="1" fill="none"/>
      <circle cx="22" cy="18" r="1.5" fill="#8FA888"/>
      <circle cx="38" cy="18" r="4.5" stroke="#8FA888" stroke-width="1" fill="none"/>
      <circle cx="38" cy="18" r="1.5" fill="#8FA888"/>
      <path d="M24 28 Q30 32 36 28" stroke="#8FA888" stroke-width="1" stroke-linecap="round" fill="none"/>
      <path d="M15 36 C10 36 7 39 6 42" stroke="#8FA888" stroke-width="1" stroke-linecap="round" fill="none"/>
      <path d="M6 42 C5 40 4 43 3 41" stroke="#8FA888" stroke-width="0.85" stroke-linecap="round" fill="none"/>
      <path d="M6 42 C6 40 7 43 8 41" stroke="#8FA888" stroke-width="0.85" stroke-linecap="round" fill="none"/>
      <path d="M45 36 C50 36 53 39 54 42" stroke="#8FA888" stroke-width="1" stroke-linecap="round" fill="none"/>
      <path d="M54 42 C53 40 52 43 51 41" stroke="#8FA888" stroke-width="0.85" stroke-linecap="round" fill="none"/>
      <path d="M54 42 C55 40 56 43 57 41" stroke="#8FA888" stroke-width="0.85" stroke-linecap="round" fill="none"/>
      <path d="M18 45 C14 48 11 50 9 49" stroke="#8FA888" stroke-width="1" stroke-linecap="round" fill="none"/>
      <path d="M42 45 C46 48 49 50 51 49" stroke="#8FA888" stroke-width="1" stroke-linecap="round" fill="none"/>
    </svg>
    <span class="site-name">Volunteer sign-up</span>
  </header>

  <h1 class="page-title">Join us</h1>

  <div class="date-picker-row">
    <label class="date-label" for="dayPicker">Signing up for</label>
    <input type="date" id="dayPicker" class="day-input">
  </div>

  <div class="slots">

    <!-- Morning -->
    <div class="slot">
      <div class="slot-header">
        <p class="slot-time-label">Morning session</p>
        <h2 class="slot-name">9:00 – 12:30</h2>
        
        <p class="slot-count" id="m-count">0 signed up</p>
      </div>
      <hr class="slot-rule">
      <div class="signup-row">
        <input class="name-input" id="m-input" type="text" placeholder="Your name" maxlength="50" autocomplete="off">
        <button class="add-btn" onclick="addName('m')">Add ↵</button>
      </div>
      <ul class="names-list" id="m-list">
        <li class="empty-slot">No one yet — be first!</li>
      </ul>
    </div>

    <!-- Evening -->
    <div class="slot">
      <div class="slot-header">
        <p class="slot-time-label">Afternoon session</p>
        <h2 class="slot-name">1:30 – 4:00</h2>
        
        <p class="slot-count" id="e-count">0 signed up</p>
      </div>
      <hr class="slot-rule">
      <div class="signup-row">
        <input class="name-input" id="e-input" type="text" placeholder="Your name" maxlength="50" autocomplete="off">
        <button class="add-btn" onclick="addName('e')">Add ↵</button>
      </div>
      <ul class="names-list" id="e-list">
        <li class="empty-slot">No one yet — be first!</li>
      </ul>
    </div>

  </div>

  <div class="admin-bar">
    <button class="admin-link" onclick="clearSlot('m')">Clear morning</button>
    <button class="admin-link" onclick="clearSlot('e')">Clear afternoon</button>
    <button class="admin-link" onclick="clearAll()">Clear all</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSdHqg3XQm0Jd2kk_ap2UPqeTI8G6byaQ9yk1B5vAzPzqAsVUg/formResponse';
const ENTRY_NAME    = 'entry.631673598';
const ENTRY_SESSION = 'entry.1285446982';
const ENTRY_DATE    = 'entry.204603571';

const KEY = 'farmvol_v4';

// Local cache: { "2026-06-25": { m: ["Ana","Ben"], e: ["Carol"] } }
function loadAll() {
  try { return JSON.parse(localStorage.getItem(KEY)) || {}; }
  catch { return {}; }
}
function persistAll(all) { localStorage.setItem(KEY, JSON.stringify(all)); }
function getDay() { return document.getElementById('dayPicker').value; }
function loadDay() { return loadAll()[getDay()] || { m: [], e: [] }; }
function saveDay(d) { const all = loadAll(); all[getDay()] = d; persistAll(all); }

function fmtDate(str) {
  if (!str) return '';
  return new Date(str + 'T12:00:00').toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
  });
}

function plural(n) { return n === 1 ? '1 signed up' : `${n} signed up`; }

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function submitToGoogle(name, session, date) {
  const body = new FormData();
  body.append(ENTRY_NAME, name);
  body.append(ENTRY_SESSION, session);
  body.append(ENTRY_DATE, date);
  // no-cors: response is opaque but submission goes through
  fetch(FORM_URL, { method: 'POST', mode: 'no-cors', body })
    .catch(() => {}); // silently fail — local record still saved
}

function render() {
  const d = loadDay();
  ['m','e'].forEach(slot => {
    const names = d[slot] || [];
    document.getElementById(`${slot}-count`).textContent = plural(names.length);
    const ul = document.getElementById(`${slot}-list`);
    if (!names.length) {
      ul.innerHTML = '<li class="empty-slot">No one yet — be first!</li>';
      return;
    }
    ul.innerHTML = names.map((n,i) => `
      <li class="name-row">
        <span class="name-num">${i+1}</span>
        <span class="name-text">${esc(n)}</span>
        <button class="remove-btn" onclick="removeName('${slot}',${i})" aria-label="Remove ${esc(n)}">remove</button>
      </li>
    `).join('');
  });
}

function addName(slot) {
  const inp = document.getElementById(`${slot}-input`);
  const name = inp.value.trim();
  if (!name) { inp.focus(); return; }
  const d = loadDay();
  if (d[slot].some(n => n.toLowerCase() === name.toLowerCase())) {
    toast(`${name} is already listed for this day`); inp.select(); return;
  }
  const date = getDay();
  const session = slot === 'm' ? 'Morning' : 'Afternoon';
  // Save locally
  d[slot].push(name);
  saveDay(d);
  // Send to Google Sheets
  submitToGoogle(name, session, date);
  inp.value = '';
  render();
  toast(`${name} added`);
  inp.focus();
}

function removeName(slot, i) {
  const d = loadDay();
  const [gone] = d[slot].splice(i, 1);
  saveDay(d);
  render();
  toast(`${gone} removed`);
}

function clearSlot(slot) {
  const label = slot === 'm' ? 'morning' : 'afternoon';
  if (!confirm(`Clear the ${label} list for ${fmtDate(getDay())}?`)) return;
  const d = loadDay(); d[slot] = []; saveDay(d); render();
  toast(`${label.charAt(0).toUpperCase()+label.slice(1)} list cleared`);
}

function clearAll() {
  if (!confirm(`Clear all sign-ups for ${fmtDate(getDay())}?`)) return;
  saveDay({ m:[], e:[] }); render(); toast('Lists cleared for this day');
}

let tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(tt); tt = setTimeout(() => el.classList.remove('show'), 2400);
}

['m','e'].forEach(slot => {
  document.getElementById(`${slot}-input`).addEventListener('keydown', e => {
    if (e.key === 'Enter') addName(slot);
  });
});

const picker = document.getElementById('dayPicker');
picker.valueAsDate = new Date();
picker.addEventListener('change', render);

render();
</script>
</body>
</html>
